name: .NET Desktop CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore StageManager.sln

      - name: Build
        run: dotnet build StageManager.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet run --project StageManager.Tests/StageManager.Tests.csproj --configuration Release --no-build
