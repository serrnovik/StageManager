name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        shell: pwsh
        run: .\publish.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: winget install --id JRSoftware.InnoSetup -e -s winget --accept-package-agreements --accept-source-agreements

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1

          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }

          & $iscc .\installer\StageManager.iss

      - name: Zip portable build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\dist -Force
          Compress-Archive -Path .\publish\StageManager-win-x64\* -DestinationPath .\dist\StageManager-portable-win-x64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StageManager-windows
          path: |
            dist\StageManagerSetup.exe
            dist\StageManager-portable-win-x64.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\StageManagerSetup.exe
            dist\StageManager-portable-win-x64.zip
